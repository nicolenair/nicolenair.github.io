<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">

  <!-- Corner teal node rings — quarter-arcs stitch into full circles at tile boundaries -->
  <circle cx="0"   cy="0"   r="5" fill="none" stroke="#4db8b8" stroke-width="1.5"/>
  <circle cx="160" cy="0"   r="5" fill="none" stroke="#4db8b8" stroke-width="1.5"/>
  <circle cx="0"   cy="160" r="5" fill="none" stroke="#4db8b8" stroke-width="1.5"/>
  <circle cx="160" cy="160" r="5" fill="none" stroke="#4db8b8" stroke-width="1.5"/>

  <!-- Trace stubs extending outward from corner nodes -->
  <line x1="5"   y1="0"   x2="22"  y2="0"   stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="0"   y1="5"   x2="0"   y2="22"  stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="155" y1="0"   x2="138" y2="0"   stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="160" y1="5"   x2="160" y2="22"  stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="5"   y1="160" x2="22"  y2="160" stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="0"   y1="155" x2="0"   y2="138" stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="155" y1="160" x2="138" y2="160" stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="160" y1="155" x2="160" y2="138" stroke="#4db8b8" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Organic leaf forms at diagonal positions (art breaking the geometry) -->
  <ellipse cx="112" cy="48"  rx="6" ry="15" fill="#5a9e6f" transform="rotate(-45,112,48)"/>
  <ellipse cx="48"  cy="48"  rx="6" ry="15" fill="#5a9e6f" transform="rotate(45,48,48)"/>
  <ellipse cx="112" cy="112" rx="6" ry="15" fill="#5a9e6f" transform="rotate(45,112,112)"/>
  <ellipse cx="48"  cy="112" rx="6" ry="15" fill="#5a9e6f" transform="rotate(-45,48,112)"/>

  <!-- Philosophy: equilateral triangle outlines (logic, Platonic forms) -->
  <polygon points="22,17 30,32 14,32" fill="none" stroke="#b0a0c8" stroke-width="1.2"/>
  <polygon points="138,128 146,143 130,143" fill="none" stroke="#b0a0c8" stroke-width="1.2"/>

  <!-- L-shaped PCB circuit traces (tech) -->
  <path d="M92,80 H118 V58"  fill="none" stroke="#4db8b8" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M68,80 H42 V102" fill="none" stroke="#4db8b8" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M86,70 V48 H108" fill="none" stroke="#4db8b8" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M74,90 V112 H52" fill="none" stroke="#4db8b8" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Via dots at trace bend points -->
  <circle cx="118" cy="80"  r="3.5" fill="#e09040"/>
  <circle cx="42"  cy="80"  r="3.5" fill="#e09040"/>
  <circle cx="86"  cy="48"  r="3.5" fill="#e09040"/>
  <circle cx="74"  cy="112" r="3.5" fill="#e09040"/>

  <!-- Terminal SMD pads at trace endpoints -->
  <rect x="114" y="54"  width="8" height="8" rx="1" fill="#e09040"/>
  <rect x="38"  y="98"  width="8" height="8" rx="1" fill="#e09040"/>
  <rect x="104" y="44"  width="8" height="8" rx="1" fill="#e09040"/>
  <rect x="48"  y="108" width="8" height="8" rx="1" fill="#e09040"/>

  <!-- Center hexagon (Platonic geometry + honeycomb + chip die) -->
  <polygon points="80,66 92,73 92,87 80,94 68,87 68,73" fill="#fdf4e0" stroke="#4db8b8" stroke-width="1.5"/>

  <!-- Six spokes inside hexagon — compass rose / wheel of reason -->
  <line x1="80" y1="80" x2="80" y2="67"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="80" x2="91" y2="73"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="80" x2="91" y2="87"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="80" x2="80" y2="93"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="80" x2="69" y2="87"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="80" x2="69" y2="73"  stroke="#4db8b8" stroke-width="1" opacity="0.5"/>

  <!-- Center amber node -->
  <circle cx="80" cy="80" r="5.5" fill="#e09040"/>
  <circle cx="80" cy="80" r="2.5" fill="#fff8e0"/>

</svg>
