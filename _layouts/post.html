---
layout: default
---

<a class="back-link" href="{{ '/' | relative_url }}">← All posts</a>

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.description %} · {{ page.description }}{% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
